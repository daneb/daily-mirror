name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.2.0)"
        required: true

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write

    # Secrets are hoisted to job-level env so that step `if:` conditions
    # can reference them via env.* (secrets.* is not allowed in if expressions).
    #
    # To enable code signing, add these repo secrets
    # (Settings → Secrets and variables → Actions):
    #   APPLE_CERTIFICATE          base64-encoded .p12 cert
    #                              → base64 -i cert.p12 | pbcopy
    #   APPLE_CERTIFICATE_PASSWORD .p12 export password
    #   KEYCHAIN_PASSWORD          any random string for the temp keychain
    #   APPLE_SIGNING_IDENTITY     "Developer ID Application: Your Name (TEAMID)"
    #   APPLE_ID                   your@apple-id.com
    #   APPLE_PASSWORD             app-specific password from appleid.apple.com
    #   APPLE_TEAM_ID              10-char team ID from developer.apple.com
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node ─────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Rust ─────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Apple code signing (skipped if secrets are absent) ────────
      - name: Import Apple certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── Install JS dependencies ───────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Build & publish release ───────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Daily Mirror ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            ## Daily Mirror ${{ github.event.inputs.tag || github.ref_name }}

            ### Install
            Download `Daily.Mirror_*.dmg`, open it, and drag **Daily Mirror** to Applications.

            ### What's changed
            <!-- fill in before releasing -->
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
